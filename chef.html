<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maankuli Chef Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <span class="logo">Ch</span>
        <div>
          <h1>Chef Dashboard</h1>
          <p>Track and accept live orders</p>
        </div>
      </div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
      </nav>
    </header>

    <main>
      <section class="order-section">
        <div class="section-heading">
          <p class="eyebrow">Kitchen Orders</p>
          <h2>All placed orders appear here for the chef team.</h2>
        </div>

        <div class="tables-actions">
          <button id="refreshOrders" class="button secondary">Refresh Orders</button>
          <button id="testModal" class="button secondary">Test Modal</button>
          <button id="testFetch" class="button secondary">Test Fetch</button>
          <span id="chefMessage" class="scanner-status"></span>
        </div>

        <div id="chefGrid" class="chef-grid"></div>
      </section>
    </main>

    <!-- Estimated Time Modal -->
    <div id="estimatedTimeModal" class="modal" style="display: none;">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h3>Enter Estimated Preparation Time</h3>
          <button id="toggleInputButton" class="button small secondary" title="Toggle input visibility">👁</button>
        </div>
        <p>How many minutes will it take to prepare this order?</p>
        <div class="modal-input-group" id="inputGroup">
          <input 
            type="number" 
            id="estimatedTimeInput" 
            min="1" 
            max="180" 
            placeholder="Enter minutes (1-180)"
            class="modal-input"
          />
        </div>
        <div class="modal-actions">
          <button id="confirmTimeButton" type="button" class="button primary">Start Cooking</button>
          <button id="cancelTimeButton" type="button" class="button secondary">Cancel</button>
        </div>
      </div>
    </div>

    <script src="chef.js"></script>
  </body>
</html>
