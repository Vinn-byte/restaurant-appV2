<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="QR Code Scanner Landing Page - Maankuli Restaurant" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Maankuli - Scan Complete</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        color: white;
      }
      .scan-container {
        text-align: center;
        padding: 2rem;
        max-width: 400px;
      }
      h1 {
        font-size: 2.5rem;
        margin-bottom: 1rem;
      }
      p {
        font-size: 1.1rem;
        margin-bottom: 2rem;
        opacity: 0.9;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 2rem auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .table-number {
        font-size: 3rem;
        font-weight: bold;
        margin: 2rem 0;
        text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      .fallback-link {
        display: inline-block;
        margin-top: 2rem;
        padding: 12px 24px;
        background: white;
        color: #667eea;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        transition: transform 0.2s;
      }
      .fallback-link:active {
        transform: scale(0.98);
      }
      .error-message {
        background: rgba(255, 255, 255, 0.2);
        padding: 1rem;
        border-radius: 8px;
        margin-top: 2rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="scan-container">
      <h1>🍽️</h1>
      <p id="message">Processing your QR code...</p>
      <div class="spinner" id="spinner"></div>
      <div class="table-number" id="tableNumber"></div>
      <a href="/" class="fallback-link">← Back to Home</a>
      <div class="error-message" id="errorMessage" style="display: none;"></div>
    </div>

    <script>
      // Redirect to order page with table parameter
      function handleScan() {
        const params = new URLSearchParams(window.location.search);
        const table = params.get('table');
        
        if (table && /^\d+$/.test(table)) {
          const tableNum = parseInt(table, 10);
          
          // Display table number
          document.getElementById('tableNumber').textContent = `Table ${tableNum}`;
          document.getElementById('message').textContent = 'Redirecting to your order...';
          
          // Redirect to order page after a brief delay
          setTimeout(() => {
            window.location.href = `/order.html?table=${tableNum}`;
          }, 800);
        } else {
          // Invalid or missing table parameter
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('message').textContent = 'Invalid QR Code';
          document.getElementById('errorMessage').style.display = 'block';
          document.getElementById('errorMessage').textContent = 
            'The QR code scanned does not contain a valid table number. Please try again.';
        }
      }

      // Run on page load
      window.addEventListener('DOMContentLoaded', handleScan);
      // Also run immediately in case DOM is already ready
      handleScan();
    </script>
  </body>
</html>
